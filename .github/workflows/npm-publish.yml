name: Publish npm package

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          registry-url: "https://registry.npmjs.org/"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Update npm for trusted publishing
        run: npm install -g npm@latest

      - name: Validate version tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          ref_name="${GITHUB_REF_NAME:-}"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            expected_tag="v${package_version}"
          else
            expected_tag="${ref_name}"
          fi

          if [[ ! "${expected_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected a stable semver tag like v1.2.3, got ${expected_tag}" >&2
            exit 1
          fi

          if [[ "${expected_tag}" != "v${package_version}" ]]; then
            echo "Tag ${expected_tag} does not match package.json version ${package_version}" >&2
            exit 1
          fi

          echo "name=${package_name}" >> "${GITHUB_OUTPUT}"
          echo "version=${package_version}" >> "${GITHUB_OUTPUT}"

      - name: Verify
        run: npm run verify

      - name: Check published version
        id: published
        shell: bash
        run: |
          set -euo pipefail

          if npm view "${{ steps.version.outputs.name }}@${{ steps.version.outputs.version }}" version --registry https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "${{ steps.version.outputs.name }}@${{ steps.version.outputs.version }} is already published."
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish
        if: steps.published.outputs.exists != 'true'
        run: npm publish --access public --registry https://registry.npmjs.org/ --provenance
